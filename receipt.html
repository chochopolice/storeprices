<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>レシート投稿 | 近所の最安商品マップ</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    .receipt-page-main { padding: 20px 0 60px; }
    .receipt-nav { margin-bottom: 16px; }
    .step-panel { margin-bottom: 16px; }
    .step-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .step-num {
      width: 28px; height: 28px; border-radius: 50%;
      background: #2e5fa3; color: #fff;
      font-size: 13px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .step-header h2 { font-size: 15px; font-weight: 600; color: #1a3a5c; margin: 0; }

    .upload-area {
      border: 2px dashed #c0cfe0; border-radius: 10px;
      padding: 32px 16px; text-align: center; cursor: pointer;
      transition: border-color .15s, background .15s; background: #f8fafc;
    }
    .upload-area:hover, .upload-area.dragover { border-color: #2e5fa3; background: #eef4fc; }
    .upload-area input[type="file"] { display: none; }
    .upload-icon { font-size: 36px; margin-bottom: 8px; }
    .upload-area p { font-size: 13px; color: #666; margin: 4px 0; }
    .upload-area .upload-hint { font-size: 11px; color: #aaa; }

    #previewArea { margin-top: 12px; display: none; }
    #previewImg { max-width: 100%; max-height: 240px; border-radius: 8px; border: 1px solid #e0e8f0; display: block; margin: 0 auto 8px; }
    .preview-name { font-size: 12px; color: #888; text-align: center; }

    .ocr-status {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-radius: 8px;
      font-size: 13px; margin-top: 12px; background: #edf2fb; color: #2e5fa3;
    }
    .ocr-status.running { background: #fff8e6; color: #b07800; }
    .ocr-status.done    { background: #eaf3de; color: #27500a; }
    .ocr-status.error   { background: #fcebeb; color: #791f1f; }
    .spinner {
      width: 16px; height: 16px; border: 2px solid currentColor;
      border-top-color: transparent; border-radius: 50%;
      animation: spin .7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .items-table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 13px; }
    .items-table th {
      background: #1a3a5c; color: #fff;
      padding: 8px 10px; text-align: left; font-weight: 600;
    }
    .items-table td { padding: 6px 8px; border-bottom: 1px solid #eef1f6; vertical-align: middle; }
    .items-table tr:last-child td { border-bottom: none; }
    .items-table tr.matched td { background: #f0f6ff; }
    .items-table tr.unmatched td { background: #fff8f0; }
    .items-table input[type="text"],
    .items-table input[type="number"],
    .items-table select {
      width: 100%; border: 1.5px solid #d0d8e4; border-radius: 6px;
      padding: 4px 7px; font-size: 12px; box-sizing: border-box; background: #fff;
    }
    .items-table input:focus, .items-table select:focus { outline: none; border-color: #2e5fa3; }
    .match-badge {
      font-size: 10px; font-weight: 700; padding: 2px 6px;
      border-radius: 99px; white-space: nowrap;
    }
    .match-badge.ok  { background: #eaf3de; color: #27500a; }
    .match-badge.ng  { background: #fff0e0; color: #854f0b; }

    .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .field span { font-size: 12px; font-weight: 600; color: #555; }
    .field input, .field select, .field textarea {
      padding: 8px 10px; border: 1.5px solid #d0d8e4; border-radius: 6px;
      font-size: 13px; background: #fff; width: 100%; box-sizing: border-box;
    }
    .field input:focus, .field select:focus { outline: none; border-color: #2e5fa3; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .button { padding: 8px 18px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .15s; }
    .button.primary   { background: #2e5fa3; color: #fff; }
    .button.primary:hover  { background: #1a3a5c; }
    .button.secondary { background: #e8f0fb; color: #2e5fa3; }
    .button.secondary:hover{ background: #d0dff5; }
    .button:disabled  { opacity: .5; cursor: not-allowed; }
    .button-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }

    .receipt-message { margin-top: 12px; font-size: 13px; padding: 10px 14px; border-radius: 8px; }
    .receipt-message.success { background: #eaf3de; color: #27500a; }
    .receipt-message.error   { background: #fcebeb; color: #791f1f; }
    .receipt-message:empty   { display: none; }

    .add-row-btn {
      font-size: 12px; color: #2e5fa3; background: none; border: none;
      cursor: pointer; padding: 6px 0; text-decoration: underline;
    }
    .del-btn {
      font-size: 11px; color: #c0392b; background: none; border: none;
      cursor: pointer; padding: 2px 6px; border-radius: 4px;
    }
    .del-btn:hover { background: #fcebeb; }
    .summary-bar {
      font-size: 12px; color: #555; padding: 6px 0;
      border-top: 1px solid #eef1f6; margin-top: 4px;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>レシート投稿</h1>
      <p>レシート画像をアップロードして価格データを投稿できます。</p>
    </div>
  </header>

  <main class="container receipt-page-main">
    <nav class="receipt-nav">
      <a class="button secondary" href="./index.html">← 検索ページへ戻る</a>
    </nav>

    <!-- Step 1: 画像 + 店舗選択 -->
    <section class="panel step-panel">
      <div class="step-header">
        <div class="step-num">1</div>
        <h2>店舗を選択してレシートを読み込む</h2>
      </div>

      <div class="field">
        <span>店舗名を入力（必須）</span>
        <input type="text" id="storeSearchInput" placeholder="例: オーケー、マルエツ..." autocomplete="off" />
        <div id="storeCandidates" style="display:none; border:1.5px solid #d0d8e4; border-radius:6px; background:#fff; max-height:200px; overflow-y:auto; margin-top:2px;"></div>
        <input type="hidden" id="storeSelect" />
        <div id="storeSelectedBadge" style="display:none; margin-top:6px; font-size:12px; padding:6px 10px; background:#eaf3de; color:#27500a; border-radius:6px;"></div>
      </div>

      <div class="two-col">
        <div class="field">
          <span>購入日（任意）</span>
          <input type="date" id="purchasedOnInput" />
        </div>
        <div></div>
      </div>

      <div class="upload-area" id="uploadArea">
        <input type="file" id="receiptImageInput" accept="image/*" capture="environment" />
        <div class="upload-icon">📷</div>
        <p>クリックまたはドラッグ＆ドロップで画像を選択</p>
        <p class="upload-hint">JPG / PNG / HEIC・最大 5MB</p>
      </div>
      <div id="previewArea">
        <img id="previewImg" src="" alt="プレビュー" />
        <div class="preview-name" id="previewName"></div>
      </div>
      <div id="ocrStatus" class="ocr-status" style="display:none"></div>
      <div class="button-row" style="margin-top:12px">
        <button id="ocrButton" class="button primary" disabled>📖 AIでレシートを解析する</button>
      </div>
    </section>

    <!-- Step 2: 解析結果の確認・編集 -->
    <section class="panel step-panel" id="step2Panel" style="display:none">
      <div class="step-header">
        <div class="step-num">2</div>
        <h2>内容を確認・修正して投稿</h2>
      </div>

      <div style="margin-top:8px; margin-bottom:6px; font-size:12px; font-weight:600; color:#555">
        商品一覧
        <span style="font-weight:400; color:#aaa; margin-left:6px">🟢 DB照合済み &nbsp; 🟡 照合できず</span>
      </div>
      <table class="items-table" id="itemsTable">
        <thead>
          <tr>
            <th style="width:30%">商品名（OCR）</th>
            <th style="width:28%">DBグループ名</th>
            <th style="width:14%">価格（円）</th>
            <th style="width:14%">状態</th>
            <th style="width:14%">操作</th>
          </tr>
        </thead>
        <tbody id="itemsBody"></tbody>
      </table>
      <button class="add-row-btn" id="addRowBtn">＋ 行を追加</button>
      <div class="summary-bar" id="summaryBar"></div>

      <div class="field" style="margin-top:12px">
        <span>補足メモ（任意）</span>
        <textarea id="noteInput" rows="2" placeholder="例: 特売・タイムセールなど"></textarea>
      </div>

      <div class="button-row">
        <button id="submitButton" class="button primary">✅ この内容で投稿する</button>
      </div>
      <div id="receiptMessage" class="receipt-message"></div>
    </section>
  </main>

  <script src="./config.js"></script>
  <script src="./receipt.js"></script>
</body>
</html>
