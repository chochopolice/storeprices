name: Import Tokubai Product Categories

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'DRY RUN（確認のみ・DBに書き込まない）'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'batch/requirements.txt'

      - name: Install dependencies
        run: pip install -r batch/requirements.txt

      - name: Run import
        working-directory: batch
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python import_tokubai_products.py --dry-run
          else
            python import_tokubai_products.py
          fi
