name: Weekly Price Scrape

on:
  schedule:
    - cron: '0 21 * * 0'   # 毎週月曜 JST 6:00

  workflow_dispatch:
    inputs:
      prefecture:
        description: '都道府県を選択'
        required: true
        default: '12 千葉県'
        type: choice
        options:
          - '01 北海道'
          - '02 青森県'
          - '03 岩手県'
          - '04 宮城県'
          - '05 秋田県'
          - '06 山形県'
          - '07 福島県'
          - '08 茨城県'
          - '09 栃木県'
          - '10 群馬県'
          - '11 埼玉県'
          - '12 千葉県'
          - '13 東京都'
          - '14 神奈川県'
          - '15 新潟県'
          - '16 富山県'
          - '17 石川県'
          - '18 福井県'
          - '19 山梨県'
          - '20 長野県'
          - '21 岐阜県'
          - '22 静岡県'
          - '23 愛知県'
          - '24 三重県'
          - '25 滋賀県'
          - '26 京都府'
          - '27 大阪府'
          - '28 兵庫県'
          - '29 奈良県'
          - '30 和歌山県'
          - '31 鳥取県'
          - '32 島根県'
          - '33 岡山県'
          - '34 広島県'
          - '35 山口県'
          - '36 徳島県'
          - '37 香川県'
          - '38 愛媛県'
          - '39 高知県'
          - '40 福岡県'
          - '41 佐賀県'
          - '42 長崎県'
          - '43 熊本県'
          - '44 大分県'
          - '45 宮崎県'
          - '46 鹿児島県'
          - '47 沖縄県'
    inputs:
      city_name:
        description: '対象市区町村名（例: 市川市、浦安市）空欄で全店舗'
        required: false
        default: '市川市'
        type: string
      enable_ocr:
        description: 'OCRを実行する'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
      max_ocr:
        description: '最大OCR枚数'
        required: false
        default: '10'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'batch/requirements.txt'

      - name: Install dependencies
        run: pip install -r batch/requirements.txt

      - name: Run scraper
        working-directory: batch
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GOOGLE_VISION_KEY:    ${{ secrets.GOOGLE_VISION_KEY }}
          ENABLE_OCR:           ${{ github.event.inputs.enable_ocr || 'false' }}
          MAX_OCR_PER_RUN:      ${{ github.event.inputs.max_ocr || '50' }}
          # 空欄の場合は全店舗対象、指定時はその市区町村に絞る
          TARGET_CITY:          ${{ github.event.inputs.city_name || '市川市' }}
        run: python main.py

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::スクレイピングバッチが失敗しました"
          echo "実行ログ: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
