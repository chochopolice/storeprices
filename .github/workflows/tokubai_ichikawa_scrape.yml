name: Scrape Tokubai Ichikawa Stores

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'DRY RUN（確認だけ・Supabase に書き込まない）'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      limit:
        description: 'テスト用。先頭から何件まで取得するか（空欄で全件）'
        required: false
        default: '5'
        type: string
      sleep:
        description: 'HTTPリクエスト間の待機秒数'
        required: false
        default: '1.0'
        type: string
      max_pages:
        description: '市川市一覧ページの最大巡回ページ数'
        required: false
        default: '100'
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'batch/requirements.txt'

      - name: Install dependencies
        run: pip install -r batch/requirements.txt

      - name: Run scraper
        working-directory: batch
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          CMD=(python tokubai_ichikawa_scraper.py
            --sleep "${{ inputs.sleep }}"
            --max-pages "${{ inputs.max_pages }}")

          if [ "${{ inputs.limit }}" != "" ]; then
            CMD+=(--limit "${{ inputs.limit }}")
          fi

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            CMD+=(--dry-run)
          fi

          printf 'Run: %s\n' "${CMD[*]}"
          "${CMD[@]}"
