name: Scrape Tokubai Stores

on:
  workflow_dispatch:
    inputs:
      prefecture_code:
        description: '都道府県コード（例: 千葉県は 12、東京都は 13）'
        required: true
        default: '12'
        type: string
      city_name:
        description: '市区町村名（例: 市川市、港区）'
        required: true
        default: '市川市'
        type: string
      limit:
        description: 'テスト用。先頭から何件まで取得するか（空欄で全件）'
        required: false
        default: '100'
        type: string
      sleep:
        description: 'HTTPリクエスト間の待機秒数'
        required: false
        default: '1.0'
        type: string
      max_pages:
        description: '一覧ページの最大巡回ページ数'
        required: false
        default: '10'
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'batch/requirements.txt'

      - name: Install dependencies
        run: pip install -r batch/requirements.txt

      - name: Run scraper
        working-directory: batch
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          CMD=(python tokubai_ichikawa_scraper.py
            --prefecture-code "${{ inputs.prefecture_code }}"
            --city-name "${{ inputs.city_name }}"
            --sleep "${{ inputs.sleep }}"
            --max-pages "${{ inputs.max_pages }}")

          if [ "${{ inputs.limit }}" != "" ]; then
            CMD+=(--limit "${{ inputs.limit }}")
          fi

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            CMD+=(--dry-run)
          fi

          printf 'Run: '
          printf '%q ' "${CMD[@]}"
          printf '\n'

          "${CMD[@]}"
