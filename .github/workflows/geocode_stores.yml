 jobs:
   geocode:
     runs-on: ubuntu-latest
     timeout-minutes: 10
 
     steps:
       - name: Checkout repository
         uses: actions/checkout@v4
 
       - name: Set up Python
         uses: actions/setup-python@v5
         with:
           python-version: '3.12'
           cache: 'pip'
           cache-dependency-path: 'batch/requirements.txt'
 
       - name: Install dependencies
         run: pip install -r batch/requirements.txt
 
       - name: Run geocoding
         working-directory: batch
         env:
           SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
           SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
+          DRY_RUN: ${{ inputs.dry_run || github.event.inputs.dry_run || 'true' }}
         run: |
-          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
+          echo "dry_run=${DRY_RUN}"
+          if [ "${DRY_RUN}" = "true" ]; then
             python geocode_stores.py --dry-run
           else
             python geocode_stores.py
           fi
 
EOF
)
